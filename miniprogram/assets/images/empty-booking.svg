<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="80" fill="#F6FFED"/>
  
  <!-- 日历外框 -->
  <rect x="60" y="65" width="80" height="70" rx="8" fill="#52C41A" opacity="0.2"/>
  <rect x="65" y="70" width="70" height="60" rx="6" fill="#FFFFFF" stroke="#52C41A" stroke-width="2"/>
  
  <!-- 日历顶部 -->
  <rect x="65" y="70" width="70" height="15" rx="6" fill="#52C41A"/>
  
  <!-- 日历挂钩 -->
  <rect x="75" y="62" width="6" height="12" rx="3" fill="#52C41A"/>
  <rect x="119" y="62" width="6" height="12" rx="3" fill="#52C41A"/>
  
  <!-- 日历内容线条 -->
  <rect x="75" y="95" width="20" height="4" rx="2" fill="#D9D9D9"/>
  <rect x="75" y="105" width="50" height="4" rx="2" fill="#D9D9D9"/>
  <rect x="75" y="115" width="35" height="4" rx="2" fill="#D9D9D9"/>
  
  <!-- 加号图标 -->
  <circle cx="140" cy="130" r="18" fill="#1890FF"/>
  <rect x="132" y="129" width="16" height="2" rx="1" fill="#FFFFFF"/>
  <rect x="139" y="122" width="2" height="16" rx="1" fill="#FFFFFF"/>
</svg>